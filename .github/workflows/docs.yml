name: Documentation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    # Scope per-ref so PRs and main don't queue behind each other; only
    # cancel in-flight builds on the same ref.
    concurrency:
      group: docs-build-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          # Matches pyproject.toml supported versions (requires-python >= 3.11,
          # classifiers list 3.11 and 3.12). Stay on 3.12 until the project
          # advertises 3.13 support.
          python-version: "3.12"

      - name: Install package + docs deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r docs/requirements.txt

      - name: Build HTML
        run: |
          sphinx-build -b html docs/source docs/build/html

      - name: Link check
        # Non-blocking — external sites occasionally rate-limit CI runners.
        # Surface broken local references in the log without failing the build.
        continue-on-error: true
        run: |
          sphinx-build -b linkcheck docs/source docs/build/linkcheck

      - name: Upload artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build/html

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # GitHub Pages only allows one in-flight deploy at a time; serialize
    # main deploys (and let the latest one cancel any pending earlier one).
    concurrency:
      group: pages-deploy
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
