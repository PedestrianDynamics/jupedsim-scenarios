name: Release to PyPI

# Triggered on `v*` tag pushes. Builds the sdist + wheel, then publishes
# via PyPI Trusted Publishers (OIDC). No API token in repo secrets — PyPI
# verifies the OIDC claim from this workflow (repo: PedestrianDynamics/jupedsim-scenarios,
# environment: pypi, workflow: workflow.yml) before accepting the upload.

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Tags are needed so version metadata picked up at build time matches the tag.
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build backend
        run: python -m pip install --upgrade pip build
      - name: Build distributions
        run: python -m build
      - name: Verify built version matches the tag
        run: |
          set -eu
          tag="${GITHUB_REF#refs/tags/v}"
          built=$(ls dist/jupedsim_scenarios-*.tar.gz | sed -E 's|.*jupedsim_scenarios-(.+)\.tar\.gz|\1|')
          if [ "$tag" != "$built" ]; then
            echo "::error::Tag is v${tag} but built sdist version is ${built}. Bump pyproject.toml [project].version to match the tag before re-tagging."
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Targets the `pypi` environment configured as the Trusted Publisher on PyPI.
    # Add a deployment branch / required reviewers rule here in repo settings
    # if you want a manual approval gate before each release goes out.
    environment:
      name: pypi
      url: https://pypi.org/p/jupedsim-scenarios
    # `id-token: write` is what OIDC needs to mint the claim PyPI verifies.
    # Setting permissions at the job level implicitly drops every other
    # default scope, so we explicitly re-grant `actions: read` for
    # `download-artifact` (technically optional for same-workflow runs in v4,
    # but cheap insurance against the action evolving its needs).
    permissions:
      id-token: write
      actions: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
